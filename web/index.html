<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Highway Area Map</title>
        <style>
            body {
                margin: 0;
                overflow: hidden;
            }

            canvas {
                display: block;
                width: 100vw;
                height: 100vh;
            }

            #drop-area {
                position: absolute;
                width: 100%;
                height: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
                background-color: rgba(0, 0, 0, 0.5);
                color: white;
            }
        </style>
    </head>
    <body>
        <div id="drop-area">Drop OSM export here</div>
        <canvas id="bevy-canvas"></canvas>
        <script type="module">
            import init, { HighwayAreaMap } from "../pkg/highway_area_map.js";

            let renderer;

            async function run() {
                await init();

                document.addEventListener("dragover", (e) => {
                    e.preventDefault();
                });

                document.addEventListener("dragleave", (e) => {
                    e.preventDefault();
                });

                document.addEventListener("drop", async (e) => {
                    e.preventDefault();

                    if (renderer) {
                        return;
                    }

                    const dropArea = document.getElementById("drop-area");
                    dropArea.textContent =
                        "Loading OSM export (this might take some time) ...";

                    const file = e.dataTransfer.files[0];

                    if (file) {
                        renderer = new HighwayAreaMap(
                            new Uint8Array(await file.arrayBuffer()),
                        );

                        dropArea.style.display = "none";

                        renderer.run();
                    }
                });
            }
            run();
        </script>
    </body>
</html>
